---
# Play 1: Generate CA and host certificates on the control node
- name: Generate TLS certificates
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/../.."

  tasks:
    - name: Create local certs directory
      ansible.builtin.file:
        path: "{{ project_root }}/certs"
        state: directory
        mode: '0700'

    - name: Generate CA private key
      community.crypto.openssl_privatekey:
        path: "{{ project_root }}/certs/ca.key"
        size: 4096

    - name: Generate CA CSR
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ project_root }}/certs/ca.key"
        common_name: "Test CA"
        use_common_name_for_san: false
        basic_constraints:
          - "CA:TRUE"
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true
      register: ca_csr

    - name: Generate self-signed CA certificate
      community.crypto.x509_certificate:
        path: "{{ project_root }}/certs/ca.crt"
        privatekey_path: "{{ project_root }}/certs/ca.key"
        csr_content: "{{ ca_csr.csr }}"
        provider: selfsigned
        selfsigned_not_after: "+3650d"

    - name: Generate Elasticsearch private key
      community.crypto.openssl_privatekey:
        path: "{{ project_root }}/certs/es.key"
        size: 2048

    - name: Generate Elasticsearch CSR
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ project_root }}/certs/es.key"
        common_name: "es"
        subject_alt_name:
          - "IP:{{ hostvars['es']['ansible_host'] }}"
          - "DNS:es"
      register: es_csr

    - name: Generate Elasticsearch certificate signed by CA
      community.crypto.x509_certificate:
        path: "{{ project_root }}/certs/es.crt"
        csr_content: "{{ es_csr.csr }}"
        ownca_path: "{{ project_root }}/certs/ca.crt"
        ownca_privatekey_path: "{{ project_root }}/certs/ca.key"
        provider: ownca
        ownca_not_after: "+3650d"

    - name: Generate Kibana private key
      community.crypto.openssl_privatekey:
        path: "{{ project_root }}/certs/kibana.key"
        size: 2048

    - name: Generate Kibana CSR
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ project_root }}/certs/kibana.key"
        common_name: "kibana"
        subject_alt_name:
          - "IP:{{ hostvars['kibana']['ansible_host'] }}"
          - "DNS:kibana"
      register: kibana_csr

    - name: Generate Kibana certificate signed by CA
      community.crypto.x509_certificate:
        path: "{{ project_root }}/certs/kibana.crt"
        csr_content: "{{ kibana_csr.csr }}"
        ownca_path: "{{ project_root }}/certs/ca.crt"
        ownca_privatekey_path: "{{ project_root }}/certs/ca.key"
        provider: ownca
        ownca_not_after: "+3650d"

    - name: Generate Fleet Server private key
      community.crypto.openssl_privatekey:
        path: "{{ project_root }}/certs/fleet.key"
        size: 2048

    - name: Generate Fleet Server CSR
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ project_root }}/certs/fleet.key"
        common_name: "fleet"
        subject_alt_name:
          - "IP:{{ hostvars['fleet']['ansible_host'] }}"
          - "DNS:fleet"
      register: fleet_csr

    - name: Generate Fleet Server certificate signed by CA
      community.crypto.x509_certificate:
        path: "{{ project_root }}/certs/fleet.crt"
        csr_content: "{{ fleet_csr.csr }}"
        ownca_path: "{{ project_root }}/certs/ca.crt"
        ownca_privatekey_path: "{{ project_root }}/certs/ca.key"
        provider: ownca
        ownca_not_after: "+3650d"


# Play 2: Install and configure Elasticsearch
- name: Install and configure Elasticsearch
  hosts: elasticsearch
  become: true
  vars:
    project_root: "{{ playbook_dir }}/../.."
  vars_files: [vars.yml]

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
          - curl
        state: present
        update_cache: true

    - name: Add Elastic GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Install Elasticsearch via apt repository
      when: not (elastic_is_snapshot | bool)
      block:
        - name: Add Elastic apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] {{ elastic_repo_url }} stable main"
            state: present
            filename: "elastic-{{ elastic_major_version }}.x"
        - name: Install Elasticsearch
          ansible.builtin.apt:
            name: "elasticsearch={{ elastic_version_apt }}"
            state: present
            update_cache: true

    - name: Install Elasticsearch from snapshot deb
      when: elastic_is_snapshot | bool
      block:
        - name: Look up Elasticsearch snapshot package URL
          ansible.builtin.uri:
            url: "{{ elastic_artifacts_api }}/elasticsearch-{{ elastic_version }}-{{ elastic_deb_arch }}.deb"
            return_content: true
          register: es_artifact
          delegate_to: localhost
          run_once: true
          become: false
        - name: Download Elasticsearch snapshot deb
          ansible.builtin.get_url:
            url: "{{ es_artifact.json.packages['elasticsearch-' + elastic_version + '-' + elastic_deb_arch + '.deb'].url }}"
            dest: "/tmp/elasticsearch-{{ elastic_version }}.deb"
        - name: Install Elasticsearch deb
          ansible.builtin.apt:
            deb: "/tmp/elasticsearch-{{ elastic_version }}.deb"
            state: present

    - name: Create certs directory
      ansible.builtin.file:
        path: /etc/elasticsearch/certs
        state: directory
        owner: root
        group: elasticsearch
        mode: '0750'

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/ca.crt"
        dest: /etc/elasticsearch/certs/ca.crt
        owner: root
        group: elasticsearch
        mode: '0640'

    - name: Copy Elasticsearch certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/es.crt"
        dest: /etc/elasticsearch/certs/es.crt
        owner: root
        group: elasticsearch
        mode: '0640'

    - name: Copy Elasticsearch private key
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/es.key"
        dest: /etc/elasticsearch/certs/es.key
        owner: root
        group: elasticsearch
        mode: '0640'

    - name: Configure Elasticsearch
      ansible.builtin.template:
        src: "{{ project_root }}/templates/elasticsearch.yml.j2"
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'
      notify: Restart Elasticsearch

    - name: Set vm.max_map_count (required by Elasticsearch)
      ansible.posix.sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        sysctl_file: /etc/sysctl.d/99-elasticsearch.conf
        reload: true

    - name: Enable and start Elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        enabled: true
        state: started
      register: es_start
      ignore_errors: true

    - name: Collect Elasticsearch journal logs on failure
      ansible.builtin.command: journalctl -u elasticsearch.service --no-pager -n 50
      register: es_journal
      when: es_start is failed

    - name: Show Elasticsearch journal logs
      ansible.builtin.fail:
        msg: "{{ es_journal.stdout }}"
      when: es_start is failed

    - name: Wait for Elasticsearch port to open
      ansible.builtin.wait_for:
        port: 9200
        timeout: 60

    - name: Set elastic user password
      ansible.builtin.shell: |
        printf '%s\n%s\n' "{{ elastic_password }}" "{{ elastic_password }}" | \
        /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -i -s -b
      no_log: true
      changed_when: true

    - name: Enable Elasticsearch self-monitoring
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_cluster/settings"
        method: PUT
        user: elastic
        password: "{{ elastic_password }}"
        ca_path: "{{ project_root }}/certs/ca.crt"
        body_format: json
        body:
          persistent:
            xpack.monitoring.collection.enabled: true
        status_code: 200
      delegate_to: localhost
      become: false

    - name: Delete existing Kibana service account token (if any)
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_security/service/elastic/kibana/credential/token/ansible-managed"
        method: DELETE
        user: elastic
        password: "{{ elastic_password }}"
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 404]
      delegate_to: localhost
      become: false
      no_log: true

    - name: Create Kibana service account token
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_security/service/elastic/kibana/credential/token/ansible-managed"
        method: POST
        user: elastic
        password: "{{ elastic_password }}"
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: kibana_token_response
      no_log: true

    - name: Store Kibana service token as host fact
      ansible.builtin.set_fact:
        kibana_service_token: "{{ kibana_token_response.json.token.value }}"
      no_log: true

    - name: Delete existing Fleet Server service account token (if any)
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_security/service/elastic/fleet-server/credential/token/ansible-managed"
        method: DELETE
        user: elastic
        password: "{{ elastic_password }}"
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 404]
      delegate_to: localhost
      become: false
      no_log: true

    - name: Create Fleet Server service account token
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_security/service/elastic/fleet-server/credential/token/ansible-managed"
        method: POST
        user: elastic
        password: "{{ elastic_password }}"
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: fleet_token_response
      no_log: true

    - name: Store Fleet Server service token as host fact
      ansible.builtin.set_fact:
        fleet_service_token: "{{ fleet_token_response.json.token.value }}"
      no_log: true

  handlers:
    - name: Restart Elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted


# Play 3: Install and configure Kibana
- name: Install and configure Kibana
  hosts: kibana
  become: true
  vars:
    project_root: "{{ playbook_dir }}/../.."
  vars_files: [vars.yml]

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
          - curl
        state: present
        update_cache: true

    - name: Add Elastic GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Install Kibana via apt repository
      when: not (elastic_is_snapshot | bool)
      block:
        - name: Add Elastic apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] {{ elastic_repo_url }} stable main"
            state: present
            filename: "elastic-{{ elastic_major_version }}.x"
        - name: Install Kibana
          ansible.builtin.apt:
            name: "kibana={{ elastic_version_apt }}"
            state: present
            update_cache: true

    - name: Install Kibana from snapshot deb
      when: elastic_is_snapshot | bool
      block:
        - name: Look up Kibana snapshot package URL
          ansible.builtin.uri:
            url: "{{ elastic_artifacts_api }}/kibana-{{ elastic_version }}-{{ elastic_deb_arch }}.deb"
            return_content: true
          register: kibana_artifact
          delegate_to: localhost
          run_once: true
          become: false
        - name: Download Kibana snapshot deb
          ansible.builtin.get_url:
            url: "{{ kibana_artifact.json.packages['kibana-' + elastic_version + '-' + elastic_deb_arch + '.deb'].url }}"
            dest: "/tmp/kibana-{{ elastic_version }}.deb"
        - name: Install Kibana deb
          ansible.builtin.apt:
            deb: "/tmp/kibana-{{ elastic_version }}.deb"
            state: present

    - name: Create certs directory
      ansible.builtin.file:
        path: /etc/kibana/certs
        state: directory
        owner: root
        group: kibana
        mode: '0750'

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/ca.crt"
        dest: /etc/kibana/certs/ca.crt
        owner: root
        group: kibana
        mode: '0640'

    - name: Copy Kibana certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/kibana.crt"
        dest: /etc/kibana/certs/kibana.crt
        owner: root
        group: kibana
        mode: '0640'

    - name: Copy Kibana private key
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/kibana.key"
        dest: /etc/kibana/certs/kibana.key
        owner: root
        group: kibana
        mode: '0640'

    - name: Configure Kibana
      ansible.builtin.template:
        src: "{{ project_root }}/templates/kibana.yml.j2"
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0660'
      notify: Restart Kibana

    - name: Flush handlers to restart Kibana with new token before proceeding
      ansible.builtin.meta: flush_handlers

    - name: Enable and start Kibana
      ansible.builtin.systemd:
        name: kibana
        enabled: true
        state: started

    - name: Wait for Kibana Fleet API to be ready and authenticated
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/settings"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: 200
      delegate_to: localhost
      become: false
      register: kibana_fleet_ready
      until: kibana_fleet_ready.status == 200
      retries: 30
      delay: 10
      no_log: true

    - name: Get existing Fleet Server hosts
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/fleet_server_hosts"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: existing_fleet_hosts

    - name: Create Fleet Server host entry
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/fleet_server_hosts"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "default"
          host_urls:
            - "https://{{ hostvars['fleet']['ansible_host'] }}:8220"
          is_default: true
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      when: existing_fleet_hosts.json.total == 0

    - name: Update existing Fleet Server host entry
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/fleet_server_hosts/{{ existing_fleet_hosts.json['items'][0].id }}"
        method: PUT
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "default"
          host_urls:
            - "https://{{ hostvars['fleet']['ansible_host'] }}:8220"
          is_default: true
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      when: existing_fleet_hosts.json.total > 0

    - name: Initialize Fleet (creates default policies and indices)
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/setup"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body: {}
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 201]
      delegate_to: localhost
      become: false

    - name: Get existing Fleet outputs
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/outputs"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: fleet_outputs

    - name: Set default output ID
      ansible.builtin.set_fact:
        default_output_id: "{{ fleet_outputs.json['items'] | selectattr('is_default', 'defined') | selectattr('is_default') | map(attribute='id') | first | default('') }}"

    - name: Update default Fleet output to point to Elasticsearch
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/outputs/{{ default_output_id }}"
        method: PUT
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "default"
          type: "elasticsearch"
          hosts:
            - "https://{{ hostvars['es']['ansible_host'] }}:9200"
          is_default: true
          is_default_monitoring: true
          ssl:
            certificate_authorities:
              - "{{ lookup('file', project_root + '/certs/ca.crt') }}"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      when: default_output_id != ''

    - name: Create default Fleet output pointing to Elasticsearch
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/outputs"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "default"
          type: "elasticsearch"
          hosts:
            - "https://{{ hostvars['es']['ansible_host'] }}:9200"
          is_default: true
          is_default_monitoring: true
          ssl:
            certificate_authorities:
              - "{{ lookup('file', project_root + '/certs/ca.crt') }}"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      when: default_output_id == ''

    - name: Get all agent policies for Fleet Server policy lookup
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: all_policies_for_fleet

    - name: Set Fleet Server policy ID (if one exists)
      ansible.builtin.set_fact:
        fleet_server_policy_id: "{{ all_policies_for_fleet.json['items'] | selectattr('is_default_fleet_server', 'defined') | selectattr('is_default_fleet_server') | map(attribute='id') | first | default('') }}"

    - name: Create Fleet Server agent policy if none exists
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "Fleet Server Policy"
          namespace: "default"
          is_default_fleet_server: true
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 201, 409]
      delegate_to: localhost
      become: false
      register: new_fleet_server_policy
      when: fleet_server_policy_id == ''

    - name: Re-fetch policies to get Fleet Server policy ID after creation
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: all_policies_for_fleet
      when: fleet_server_policy_id == ''

    - name: Update Fleet Server policy ID after creation
      ansible.builtin.set_fact:
        fleet_server_policy_id: "{{ all_policies_for_fleet.json['items'] | selectattr('is_default_fleet_server', 'defined') | selectattr('is_default_fleet_server') | map(attribute='id') | first }}"
      when: fleet_server_policy_id == ''

    - name: Get all agent policies
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: all_policies

    - name: Set default agent policy ID (if one exists)
      ansible.builtin.set_fact:
        default_policy_id: "{{ all_policies.json['items'] | selectattr('is_default', 'defined') | selectattr('is_default') | map(attribute='id') | first | default('') }}"

    - name: Create default agent policy if none exists
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "Default Agent Policy"
          namespace: "default"
          is_default: true
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 201, 409]
      delegate_to: localhost
      become: false
      register: new_policy
      when: default_policy_id == ''

    - name: Re-fetch policies to get default policy ID after creation
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/agent_policies"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: all_policies
      when: default_policy_id == ''

    - name: Update default policy ID after creation
      ansible.builtin.set_fact:
        default_policy_id: "{{ all_policies.json['items'] | selectattr('is_default', 'defined') | selectattr('is_default') | map(attribute='id') | first }}"
      when: default_policy_id == ''

    - name: Create enrollment token for default agent policy
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/enrollment_api_keys"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          policy_id: "{{ default_policy_id }}"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: enrollment_token_response
      no_log: true

    - name: Store enrollment token as host fact
      ansible.builtin.set_fact:
        agent_enrollment_token: "{{ enrollment_token_response.json['item']['api_key'] }}"
      no_log: true

    - name: Get fleet_server package version from EPM
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/epm/packages/fleet_server"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: fleet_server_pkg

    - name: Get existing package policies
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/package_policies"
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
      delegate_to: localhost
      become: false
      register: existing_package_policies

    - name: Add fleet-server integration to Fleet Server agent policy
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:5601/api/fleet/package_policies"
        method: POST
        headers:
          kbn-xsrf: "true"
        body_format: json
        body:
          name: "fleet-server-1"
          namespace: "default"
          policy_ids:
            - "{{ fleet_server_policy_id }}"
          package:
            name: "fleet_server"
            version: "{{ fleet_server_pkg.json['item']['version'] }}"
          inputs:
            - type: "fleet-server"
              enabled: true
              streams: []
              vars: {}
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        ca_path: "{{ project_root }}/certs/ca.crt"
        status_code: [200, 201, 409]
      delegate_to: localhost
      become: false
      when: (existing_package_policies.json['items'] | selectattr('package', 'defined') | selectattr('package.name', 'equalto', 'fleet_server') | list | length) == 0

  handlers:
    - name: Restart Kibana
      ansible.builtin.systemd:
        name: kibana
        state: restarted


# Play 4: Install Fleet Server
- name: Install Fleet Server
  hosts: fleet
  become: true
  vars:
    project_root: "{{ playbook_dir }}/../.."
  vars_files: [vars.yml]

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
          - curl
        state: present
        update_cache: true

    - name: Add Elastic GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Add Elastic apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] {{ elastic_repo_url }} stable main"
        state: present
        filename: "elastic-{{ elastic_major_version }}.x"
      when: not (elastic_is_snapshot | bool)

    - name: Check if fleet-server component binary exists (complete flavor)
      ansible.builtin.find:
        paths: /var/lib/elastic-agent/data
        patterns: "fleet-server"
        recurse: true
        file_type: file
      register: fleet_server_binary
      failed_when: false

    - name: Stop elastic-agent before reinstall with complete flavor
      ansible.builtin.systemd:
        name: elastic-agent
        state: stopped
      when: fleet_server_binary.matched == 0
      failed_when: false

    - name: Purge elastic-agent (basic flavor) before reinstall
      ansible.builtin.apt:
        name: elastic-agent
        state: absent
        purge: true
      when: fleet_server_binary.matched == 0

    - name: Install elastic-agent with complete flavor via apt (includes fleet-server)
      ansible.builtin.apt:
        name: "elastic-agent={{ elastic_version_apt }}"
        state: present
        update_cache: true
      environment:
        ELASTIC_AGENT_FLAVOR: complete
      ignore_errors: true
      when: not (elastic_is_snapshot | bool)

    - name: Install elastic-agent with complete flavor from snapshot deb
      when: elastic_is_snapshot | bool
      block:
        - name: Look up elastic-agent snapshot package URL
          ansible.builtin.uri:
            url: "{{ elastic_artifacts_api }}/elastic-agent-{{ elastic_version }}-{{ elastic_deb_arch }}.deb"
            return_content: true
          register: agent_artifact
          delegate_to: localhost
          run_once: true
          become: false
        - name: Download elastic-agent snapshot deb
          ansible.builtin.get_url:
            url: "{{ agent_artifact.json.packages['elastic-agent-' + elastic_version + '-' + elastic_deb_arch + '.deb'].url }}"
            dest: "/tmp/elastic-agent-{{ elastic_version }}.deb"
        - name: Install elastic-agent deb (complete flavor)
          ansible.builtin.apt:
            deb: "/tmp/elastic-agent-{{ elastic_version }}.deb"
            state: present
          environment:
            ELASTIC_AGENT_FLAVOR: complete
          ignore_errors: true

    - name: Patch postinst to tolerate apply-flavor failure (ARM64 compatibility)
      ansible.builtin.replace:
        path: /var/lib/dpkg/info/elastic-agent.postinst
        regexp: 'apply-flavor$'
        replace: 'apply-flavor || true'
      failed_when: false

    - name: Fix dpkg broken state after postinst patch
      ansible.builtin.command: dpkg --configure -a
      failed_when: false
      changed_when: false

    - name: Create certs directory
      ansible.builtin.file:
        path: /etc/elastic-agent/certs
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/ca.crt"
        dest: /etc/elastic-agent/certs/ca.crt
        owner: root
        group: root
        mode: '0600'

    - name: Copy Fleet Server certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/fleet.crt"
        dest: /etc/elastic-agent/certs/fleet.crt
        owner: root
        group: root
        mode: '0600'

    - name: Copy Fleet Server private key
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/fleet.key"
        dest: /etc/elastic-agent/certs/fleet.key
        owner: root
        group: root
        mode: '0600'

    - name: Check if elastic-agent is already enrolled as Fleet Server
      ansible.builtin.shell: elastic-agent status 2>&1 | grep -q "Not enrolled"
      register: not_enrolled
      changed_when: false
      failed_when: false

    - name: Enroll elastic-agent as Fleet Server
      ansible.builtin.command:
        cmd: >
          elastic-agent enroll
          --url=https://{{ ansible_host }}:8220
          --fleet-server-es=https://{{ hostvars['es']['ansible_host'] }}:9200
          --fleet-server-service-token={{ hostvars['es']['fleet_service_token'] }}
          --fleet-server-policy={{ hostvars['kibana']['fleet_server_policy_id'] }}
          --fleet-server-es-ca=/etc/elastic-agent/certs/ca.crt
          --fleet-server-cert=/etc/elastic-agent/certs/fleet.crt
          --fleet-server-cert-key=/etc/elastic-agent/certs/fleet.key
          --certificate-authorities=/etc/elastic-agent/certs/ca.crt
          --force
      when: not_enrolled.rc == 0
      no_log: true

    - name: Restart elastic-agent after Fleet Server enrollment
      ansible.builtin.systemd:
        name: elastic-agent
        state: restarted
      when: not_enrolled.rc == 0


# Play 5: Install and enroll elastic-agent on agent VMs
- name: Install and enroll elastic-agent
  hosts: agents
  become: true
  vars:
    project_root: "{{ playbook_dir }}/../.."
  vars_files: [vars.yml]

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
          - curl
        state: present
        update_cache: true

    - name: Add Elastic GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Install elastic-agent via apt repository
      when: not (elastic_is_snapshot | bool)
      block:
        - name: Add Elastic apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] {{ elastic_repo_url }} stable main"
            state: present
            filename: "elastic-{{ elastic_major_version }}.x"
        - name: Install elastic-agent
          ansible.builtin.apt:
            name: "elastic-agent={{ elastic_version_apt }}"
            state: present
            update_cache: true

    - name: Install elastic-agent from snapshot deb
      when: elastic_is_snapshot | bool
      block:
        - name: Look up elastic-agent snapshot package URL
          ansible.builtin.uri:
            url: "{{ elastic_artifacts_api }}/elastic-agent-{{ elastic_version }}-{{ elastic_deb_arch }}.deb"
            return_content: true
          register: agent_artifact
          delegate_to: localhost
          run_once: true
          become: false
        - name: Download elastic-agent snapshot deb
          ansible.builtin.get_url:
            url: "{{ agent_artifact.json.packages['elastic-agent-' + elastic_version + '-' + elastic_deb_arch + '.deb'].url }}"
            dest: "/tmp/elastic-agent-{{ elastic_version }}.deb"
        - name: Install elastic-agent deb
          ansible.builtin.apt:
            deb: "/tmp/elastic-agent-{{ elastic_version }}.deb"
            state: present

    - name: Create certs directory
      ansible.builtin.file:
        path: /etc/elastic-agent/certs
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ project_root }}/certs/ca.crt"
        dest: /etc/elastic-agent/certs/ca.crt
        owner: root
        group: root
        mode: '0600'

    - name: Check if elastic-agent is already enrolled
      ansible.builtin.shell: elastic-agent status 2>&1 | grep -q "Not enrolled"
      register: not_enrolled
      changed_when: false
      failed_when: false

    - name: Enroll elastic-agent with Fleet
      ansible.builtin.command:
        cmd: >
          elastic-agent enroll
          --url=https://{{ hostvars['fleet']['ansible_host'] }}:8220
          --enrollment-token={{ hostvars['kibana']['agent_enrollment_token'] }}
          --certificate-authorities=/etc/elastic-agent/certs/ca.crt
          --force
      when: not_enrolled.rc == 0
      no_log: true

    - name: Restart elastic-agent after enrollment
      ansible.builtin.systemd:
        name: elastic-agent
        state: restarted
      when: not_enrolled.rc == 0


